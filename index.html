<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker By Saad</title>

    <!-- Tailwind + DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Style -->
     <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="min-h-screen flex justify-center items-center">

        <div class="card card-body shadow-xl max-w-lg ">
           <div class="p-8 space-y-4">
               <div class="text-center">
                <img class="mb-6 block mx-auto" src="./assets/github-logo.png" alt="">
                   <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
                   <p class="text-[#64748B]">Sign in to manage your issues</p>
               </div>
    
               <!-- Login From -->
               <div class="space-y-2.5">
                <div>
                    <label class="label text-[#1F2937] font-medium">Username</label>
                    <br>
                    <input type="email" class="input" placeholder="Enter Username" />
                    <p class="text-blue-500 text-xs mt-1 ml-1">Default: admin</p>
                </div>
        
                <div>
                    <label class="label text-[#1F2937] font-medium">Password</label>
                    <br>
                    <input type="password" class="input" placeholder="Enter Password" />
                    <p class="text-blue-500 text-xs mt-1 ml-1">Password: 1234</p>
                </div>
                   
                <button class="btn btn-primary mt-4 w-full">Sing In</button>
    
               </div>
    
               <div class="divider text-gray-700 text-sm font-medium m-y-3">OR</div>
    
               <div class="text-center">
                   <p class="text-[14px] text-[#64748B]">Demo Credentials:</p>
                   
                   <div class="bg-[#F8FAFC] py-6">
                    <p><span class="font-bold text-[#1F2937]">Username:</span> admin</p>
                    <p><span class="font-bold text-[#1F2937]">Password:</span> admin</p>
                   </div>
    
               </div>
    
           </div>
    
        </div>
    </div>
    


    <script src="./script.js"></script>
</body>
</html>
