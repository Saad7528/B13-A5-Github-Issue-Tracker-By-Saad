        <div class="w-9/12 mx-auto mt-14 p-6 bg-white card card-body shadow-2xl">
            <div id="status-btn-container" class="space-x-2">
                <button id="all-btn" onclick="switchBtn('all')" class="btn cursor-pointer btn-primary w-28 ">All</button>
                <button id="open-btn" onclick="switchBtn('open')" class="btn cursor-pointer w-28">Open</button>
                <button id="close-btn" onclick="switchBtn('close')" class="btn cursor-pointer w-28">Closed</button>

        <section class="w-9/12 mx-auto mt-4 p-6 bg-white card card-body shadow-2xl">
